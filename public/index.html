<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokument Upload (AI Agent)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        #drop-area {
            border: 2px dashed #007bff;
            border-radius: 10px;
            padding: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #drop-area.hover {
            background-color: #e9f5ff;
        }
        #file-input {
            display: none;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover {
            background: #0056b3;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
        }
        .loading {
            color: #ff9800;
        }
        .success {
            color: #4caf50;
        }
        .error {
            color: #f44336;
        }
        #job-list {
            margin-top: 20px;
            text-align: left;
        }
        .job-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
            border-left: 5px solid #ccc;
        }
        .job-item.pending { border-left-color: #ccc; }
        .job-item.processing { border-left-color: #ff9800; }
        .job-item.completed { border-left-color: #4caf50; }
        .job-item.error { border-left-color: #f44336; }
        
        .job-title { font-weight: bold; margin-bottom: 5px; }
        .job-status { font-size: 12px; color: #666; margin-bottom: 10px;}
        .job-result { font-size: 13px; }
        
        .clear-btn {
            background: #dc3545;
            margin-top: 10px;
            font-size: 14px;
            padding: 5px 10px;
        }
        .clear-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dokument(e) hochladen</h2>
    <div id="drop-area">
        <p>Datei(en) hier ablegen oder</p>
        <button id="browse-btn">Dateien auswählen</button>
        <input type="file" id="file-input" accept=".pdf,.jpeg,.jpg,.png" multiple>
    </div>

    <div id="status"></div>
    
    <div id="job-list-container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <h3 style="margin: 0;">Upload Status</h3>
            <button id="clear-jobs-btn" class="clear-btn">Liste leeren</button>
        </div>
        <div id="job-list"></div>
    </div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const browseBtn = document.getElementById('browse-btn');
    const statusDiv = document.getElementById('status');
    const jobListContainer = document.getElementById('job-list-container');
    const jobList = document.getElementById('job-list');
    const clearJobsBtn = document.getElementById('clear-jobs-btn');
    
    let activeJobs = JSON.parse(localStorage.getItem('uploadJobs') || '[]');
    let pollingInterval = null;

    // Load initial jobs
    if (activeJobs.length > 0) {
        jobListContainer.style.display = 'block';
        renderJobs();
        startPolling();
    }

    // Drag & Drop Events
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('hover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('hover'), false);
    });

    dropArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        let dt = e.dataTransfer;
        let files = dt.files;
        if (files.length > 0) uploadFiles(files);
    }

    browseBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) uploadFiles(this.files);
    });
    
    clearJobsBtn.addEventListener('click', () => {
        activeJobs = [];
        localStorage.removeItem('uploadJobs');
        jobListContainer.style.display = 'none';
        statusDiv.innerHTML = '';
        renderJobs();
    });

    async function uploadFiles(files) {
        let formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('files', files[i]);
        }

        statusDiv.innerHTML = 'Lade Dateien hoch... Bitte warten.';
        statusDiv.className = 'loading';

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                statusDiv.innerHTML = 'Dateien hochgeladen & in der Warteschlange!';
                statusDiv.className = 'success';
                
                // Add new jobs to active jobs
                const newJobs = data.jobs.map(job => ({
                    id: job.id,
                    originalName: job.originalName,
                    status: job.status,
                    result: job.result,
                    error: job.error,
                    uploadDate: job.uploadDate
                }));
                
                activeJobs = [...newJobs, ...activeJobs];
                localStorage.setItem('uploadJobs', JSON.stringify(activeJobs));
                
                jobListContainer.style.display = 'block';
                renderJobs();
                startPolling();
                
                setTimeout(() => {
                    if(statusDiv.className === 'success') {
                        statusDiv.innerHTML = '';
                    }
                }, 3000);
            } else {
                statusDiv.innerHTML = 'Fehler: ' + (data.error || 'Unbekannter Fehler');
                statusDiv.className = 'error';
            }
        } catch (error) {
            statusDiv.innerHTML = 'Verbindungsfehler beim Hochladen aufgetreten.';
            statusDiv.className = 'error';
        }
        
        // Reset file input
        fileInput.value = '';
    }
    
    function startPolling() {
        if (pollingInterval) return;
        
        pollingInterval = setInterval(async () => {
            const pendingJobs = activeJobs.filter(j => j.status === 'pending' || j.status === 'processing');
            if (pendingJobs.length === 0) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                return;
            }
            
            const ids = pendingJobs.map(j => j.id).join(',');
            try {
                const res = await fetch(`/api/status?ids=${ids}`);
                const data = await res.json();
                
                if (data.success) {
                    let updated = false;
                    data.statuses.forEach(serverJob => {
                        const localJob = activeJobs.find(j => j.id === serverJob.id);
                        if (localJob && localJob.status !== serverJob.status) {
                            localJob.status = serverJob.status;
                            localJob.result = serverJob.result;
                            localJob.error = serverJob.error;
                            if (serverJob.uploadDate && !localJob.uploadDate) localJob.uploadDate = serverJob.uploadDate;
                            updated = true;
                        }
                    });
                    
                    if (updated) {
                        localStorage.setItem('uploadJobs', JSON.stringify(activeJobs));
                        renderJobs();
                    }
                }
            } catch (err) {
                console.error("Polling error", err);
            }
        }, 2000);
    }
    
    function renderJobs() {
        jobList.innerHTML = '';
        if (activeJobs.length === 0) {
            jobListContainer.style.display = 'none';
            return;
        }
        
        activeJobs.forEach(job => {
            const div = document.createElement('div');
            div.className = `job-item ${job.status}`;
            
            let statusText = job.status === 'pending' ? 'In der Warteschlange...' : 
                             job.status === 'processing' ? 'Wird verarbeitet (KI)...' : 
                             job.status === 'completed' ? 'Erfolgreich abgeschlossen' : 'Fehlergeschlagen';
            
            const displayDate = job.uploadDate ? new Date(job.uploadDate).toLocaleString('de-DE') : '-';

            let resultHtml = '';
            if (job.status === 'completed' && job.result) {
                const tagsStr = (job.result.tags && Array.isArray(job.result.tags)) ? job.result.tags.join(', ') : '-';
                const isInvoiceStr = job.result.isInvoice ? 'Ja' : 'Nein';
                const durationStr = job.result.duration ? `${job.result.duration} Sekunden` : '-';
                
                resultHtml = `
                    <div class="job-result">
                        <strong>Neuer Name:</strong> ${job.result.full}<br>
                        <strong>Kategorie:</strong> ${job.result.category || '-'}<br>
                        <strong>Unternehmen:</strong> ${job.result.company || '-'}<br>
                        <strong>Tags:</strong> ${tagsStr}<br>
                        <strong>Rechnung:</strong> ${isInvoiceStr}<br>
                        <strong style="color: #007bff;">KI-Verarbeitungsdauer:</strong> ${durationStr}
                    </div>
                `;
            } else if (job.status === 'error') {
                resultHtml = `<div class="job-result error">${job.error || 'Unbekannter Fehler'}</div>`;
            }
            
            div.innerHTML = `
                <div class="job-title" style="display: flex; justify-content: space-between;">
                    <span>${job.originalName}</span>
                    <span style="font-size: 12px; font-weight: normal; color: #888;">Hochgeladen am: ${displayDate}</span>
                </div>
                <div class="job-status">${statusText}</div>
                ${resultHtml}
            `;
            jobList.appendChild(div);
        });
    }
</script>

</body>
</html>
