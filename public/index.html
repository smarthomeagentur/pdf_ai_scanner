<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokument Upload (AI Agent)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        #drop-area {
            border: 2px dashed #007bff;
            border-radius: 10px;
            padding: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #drop-area.hover {
            background-color: #e9f5ff;
        }
        #file-input {
            display: none;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover {
            background: #0056b3;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
        }
        .loading {
            color: #ff9800;
        }
        .success {
            color: #4caf50;
        }
        .error {
            color: #f44336;
        }
        #result {
            margin-top: 15px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dokument hochladen</h2>
    <div id="drop-area">
        <p>Datei hier ablegen oder</p>
        <button id="browse-btn">Datei auswählen</button>
        <input type="file" id="file-input" accept=".pdf,.jpeg,.jpg,.png">
    </div>

    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const browseBtn = document.getElementById('browse-btn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');

    // Drag & Drop Events
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('hover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('hover'), false);
    });

    dropArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        let dt = e.dataTransfer;
        let files = dt.files;
        if (files.length > 0) uploadFile(files[0]);
    }

    browseBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) uploadFile(this.files[0]);
    });

    async function uploadFile(file) {
        let formData = new FormData();
        formData.append('file', file);

        statusDiv.innerHTML = 'Verarbeite Datei lokal mit KI... Bitte warten.';
        statusDiv.className = 'loading';
        resultDiv.style.display = 'none';

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                statusDiv.innerHTML = 'Datei erfolgreich verarbeitet und auf Drive hochgeladen!';
                statusDiv.className = 'success';
                
                // Show AI Info
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <strong>Generierter Dateiname:</strong> <br>${data.aiInfo.full}<br><br>
                    <strong>Kategorie:</strong> ${data.aiInfo.category}<br>
                    <strong>Tags:</strong> ${data.aiInfo.tags.join(', ')}<br>
                    <strong>Unternehmen:</strong> ${data.aiInfo.company}<br>
                    <strong>Ist Rechnung:</strong> ${data.aiInfo.isInvoice ? 'Ja' : 'Nein'}
                `;
            } else {
                statusDiv.innerHTML = 'Fehler: ' + (data.error || 'Unbekannter Fehler');
                statusDiv.className = 'error';
            }
        } catch (error) {
            statusDiv.innerHTML = 'Verbindungsfehler aufgetreten.';
            statusDiv.className = 'error';
        }
    }
</script>

</body>
</html>
