<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Dokument Scanner</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f4f7f6">
    <link rel="apple-touch-icon" href="/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scanner">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        #drop-area {
            border: 2px dashed #007bff;
            border-radius: 10px;
            padding: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #drop-area.hover {
            background-color: #e9f5ff;
        }
        #file-input {
            display: none;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover {
            background: #0056b3;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
        }
        .loading {
            color: #ff9800;
        }
        .success {
            color: #4caf50;
        }
        .error {
            color: #f44336;
        }
        #job-list {
            margin-top: 20px;
            text-align: left;
        }
        .job-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
            border-left: 5px solid #ccc;
        }
        .job-item.pending { border-left-color: #ccc; }
        .job-item.processing { border-left-color: #ff9800; }
        .job-item.completed { border-left-color: #4caf50; }
        .job-item.error { border-left-color: #f44336; }
        
        .job-title { font-weight: bold; margin-bottom: 5px; }
        .job-status { font-size: 12px; color: #666; margin-bottom: 10px;}
        .job-result { font-size: 13px; }
        
        .clear-btn {
            background: #dc3545;
            margin-top: 10px;
            font-size: 14px;
            padding: 5px 10px;
        }
        .clear-btn:hover {
            background: #c82333;
        }
        .progress-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 5px;
            height: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: #ff9800;
            width: 0%;
            transition: width 0.5s linear;
        }

        /* Mobile Adjustments */
        .live-scanner-btn {
            display: flex; /* Changed from inline-block to flex for easier centering if needed */
            justify-content: center;
            align-items: center;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .live-scanner-btn:hover {
            background: #218838;
        }

        @media (max-width: 600px) {
            body {
                padding: 0;
                align-items: flex-start; /* Start from top on mobile */
            }
            .container {
                box-shadow: none;
                border-radius: 0;
                padding: 20px 15px;
                min-height: 100vh; /* Fill entire screen */
            }
            .live-scanner-btn {
                padding: 16px 20px;
                font-size: 1.3rem; /* Make the button bigger */
            }
            #drop-area {
                padding: 25px 15px; /* Make the file upload area smaller */
            }
            #drop-area p {
                margin: 0;
                font-size: 14px;
            }
            button#browse-btn {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Dokument Scanner</h2>
    
    <a href="/scanner.html" class="live-scanner-btn">Live Scanner</a>

    <div id="drop-area">
        <p>Datei(en) hier ablegen oder</p>
        <button id="browse-btn">Dateien auswählen</button>
        <input type="file" id="file-input" accept=".pdf,.jpeg,.jpg,.png" multiple>
    </div>

    <div id="status"></div>
    
    <div id="job-list-container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <h3 style="margin: 0;">Upload Status <span id="active-job-count" style="font-size: 14px; font-weight: normal; color: #666; margin-left: 10px;"></span></h3>
            <button id="clear-jobs-btn" class="clear-btn">Liste leeren</button>
        </div>
        <div id="job-list"></div>
    </div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const browseBtn = document.getElementById('browse-btn');
    const statusDiv = document.getElementById('status');
    const jobListContainer = document.getElementById('job-list-container');
    const jobList = document.getElementById('job-list');
    const clearJobsBtn = document.getElementById('clear-jobs-btn');
    
    let activeJobs = JSON.parse(localStorage.getItem('uploadJobs') || '[]');
    let pollingInterval = null;

    // Load initial jobs
    if (activeJobs.length > 0) {
        jobListContainer.style.display = 'block';
        renderJobs();
        startPolling();
    }

    // Drag & Drop Events
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('hover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('hover'), false);
    });

    dropArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        let dt = e.dataTransfer;
        let files = dt.files;
        if (files.length > 0) uploadFiles(files);
    }

    browseBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) uploadFiles(this.files);
    });
    
    clearJobsBtn.addEventListener('click', () => {
        activeJobs = [];
        localStorage.removeItem('uploadJobs');
        jobListContainer.style.display = 'none';
        statusDiv.innerHTML = '';
        renderJobs();
    });

    async function uploadFiles(files) {
        let formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('files', files[i]);
        }

        statusDiv.innerHTML = 'Lade Dateien hoch... Bitte warten.';
        statusDiv.className = 'loading';

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                statusDiv.innerHTML = 'Dateien hochgeladen & in der Warteschlange!';
                statusDiv.className = 'success';
                
                // Add new jobs to active jobs
                const newJobs = data.jobs.map(job => ({
                    id: job.id,
                    originalName: job.originalName,
                    status: job.status,
                    result: job.result,
                    error: job.error,
                    uploadDate: job.uploadDate
                }));
                
                activeJobs = [...newJobs, ...activeJobs];
                localStorage.setItem('uploadJobs', JSON.stringify(activeJobs));
                
                jobListContainer.style.display = 'block';
                renderJobs();
                startPolling();
                
                setTimeout(() => {
                    if(statusDiv.className === 'success') {
                        statusDiv.innerHTML = '';
                    }
                }, 3000);
            } else {
                statusDiv.innerHTML = 'Fehler: ' + (data.error || 'Unbekannter Fehler');
                statusDiv.className = 'error';
            }
        } catch (error) {
            statusDiv.innerHTML = 'Verbindungsfehler beim Hochladen aufgetreten.';
            statusDiv.className = 'error';
        }
        
        // Reset file input
        fileInput.value = '';
    }
    
    function startPolling() {
        if (pollingInterval) return;
        
        pollingInterval = setInterval(async () => {
            const pendingJobs = activeJobs.filter(j => j.status === 'pending' || j.status === 'processing');
            if (pendingJobs.length === 0) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                return;
            }
            
            const ids = pendingJobs.map(j => j.id).join(',');
            try {
                const res = await fetch(`/api/status?ids=${ids}`);
                const data = await res.json();
                
                if (data.success) {
                    let updated = false;
                    data.statuses.forEach(serverJob => {
                        const localJob = activeJobs.find(j => j.id === serverJob.id);
                        // Check if status changed or it just started processing
                        if (localJob && (
                            localJob.status !== serverJob.status || 
                            (!localJob.processingStartedAt && serverJob.processingStartedAt)
                        )) {
                            localJob.status = serverJob.status;
                            localJob.result = serverJob.result;
                            localJob.error = serverJob.error;
                            if (serverJob.processingStartedAt) localJob.processingStartedAt = serverJob.processingStartedAt;
                            if (serverJob.uploadDate && !localJob.uploadDate) localJob.uploadDate = serverJob.uploadDate;
                            updated = true;
                        }
                    });
                    
                    if (updated) {
                        localStorage.setItem('uploadJobs', JSON.stringify(activeJobs));
                        renderJobs();
                    }
                }
            } catch (err) {
                console.error("Polling error", err);
            }
        }, 2000);
    }
    
    function renderJobs() {
        const countSpan = document.getElementById('active-job-count');
        if (countSpan) {
            const activeCount = activeJobs.filter(j => j.status === 'pending' || j.status === 'processing').length;
            countSpan.innerHTML = activeCount > 0 ? `(${activeCount} in Arbeit)` : '';
        }

        jobList.innerHTML = '';
        if (activeJobs.length === 0) {
            jobListContainer.style.display = 'none';
            return;
        }
        
        activeJobs.forEach(job => {
            const div = document.createElement('div');
            div.className = `job-item ${job.status}`;
            
            let statusText = job.status === 'pending' ? 'In der Warteschlange...' : 
                             job.status === 'processing' ? 'Wird verarbeitet (KI)...' : 
                             job.status === 'completed' ? 'Erfolgreich abgeschlossen' : 'Fehlergeschlagen';
            
            const displayDate = job.uploadDate ? new Date(job.uploadDate).toLocaleString('de-DE') : '-';

            let resultHtml = '';
            if (job.status === 'completed' && job.result) {
                const tagsStr = (job.result.tags && Array.isArray(job.result.tags)) ? job.result.tags.join(', ') : '-';
                const isInvoiceStr = job.result.isInvoice ? 'Ja' : 'Nein';
                const durationStr = job.result.duration ? `${job.result.duration} Sekunden` : '-';
                
                resultHtml = `
                    <details class="job-result" style="margin-top: 10px;">
                        <summary style="cursor: pointer; color: #007bff; font-weight: bold; margin-bottom: 5px;">Details anzeigen</summary>
                        <div style="margin-top: 5px; padding: 10px; background: #fff; border-radius: 5px; border: 1px solid #eee;">
                            <strong style="color: #4caf50;">Neuer Name:</strong> ${job.result.full}<br>
                            <strong>Kategorie:</strong> ${job.result.category || '-'}<br>
                            <strong>Unternehmen:</strong> ${job.result.company || '-'}<br>
                            <strong>Tags:</strong> ${tagsStr}<br>
                            <strong>Rechnung:</strong> ${isInvoiceStr}<br>
                            <br><strong style="color: #007bff;">KI-Verarbeitungsdauer:</strong> ${durationStr}
                        </div>
                    </details>
                `;
            } else if (job.status === 'error') {
                resultHtml = `<div class="job-result error">${job.error || 'Unbekannter Fehler'}</div>`;
            } else if (job.status === 'processing') {
                let progressStyles = '';
                if (job.processingStartedAt) {
                    const elapsedSec = (Date.now() - job.processingStartedAt) / 1000;
                    // 0 to 100% over 200 seconds, max out at 99% while processing
                    const progress = Math.min((elapsedSec / 200) * 100, 99);
                    progressStyles = `width: ${progress}%;`;
                }
                resultHtml = `
                    <div class="progress-container">
                        <div class="progress-bar" data-job-id="${job.id}" style="${progressStyles}"></div>
                    </div>
                `;
            }
            
            div.innerHTML = `
                <div class="job-title" style="display: flex; flex-direction: column; gap: 4px;">
                    <span style="word-break: break-word; line-height: 1.2;">${job.originalName}</span>
                    <span style="font-size: 12px; font-weight: normal; color: #888;">Hochgeladen am: ${displayDate}</span>
                </div>
                <div class="job-status">${statusText}</div>
                ${resultHtml}
            `;
            jobList.appendChild(div);
        });
    }
    
    // Update progress bars periodically based on time elapsed
    setInterval(() => {
        const bars = document.querySelectorAll('.progress-bar');
        bars.forEach(bar => {
            const jobId = bar.getAttribute('data-job-id');
            const job = activeJobs.find(j => j.id === jobId);
            
            if (job && job.processingStartedAt && job.status === 'processing') {
                const elapsedSec = (Date.now() - job.processingStartedAt) / 1000;
                // 0 to 100% over 200 seconds, max out at 99% while processing
                const progressProgress = Math.min((elapsedSec / 200) * 100, 99);
                bar.style.width = progressProgress + '%';
            }
        });
    }, 500);

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => console.log('ServiceWorker registration successful'))
                .catch(err => console.log('ServiceWorker registration failed: ', err));
        });
    }
</script>

</body>
</html>
