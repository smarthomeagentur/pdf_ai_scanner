<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AI Dokument Scanner</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f4f7f6" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Scanner" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <!-- Sticky Header matching scanner.html -->
    <div
      class="sticky-top bg-white border-bottom shadow-sm d-flex justify-content-between align-items-center p-3"
    >
      <h5 class="m-0 fw-bold text-dark">AI Scanner</h5>
      <div class="d-flex gap-2">
        <button
          class="btn btn-sm btn-outline-secondary"
          id="openSettingsBtn"
          style="font-size: 1.1rem; padding: 2px 8px; border-radius: 6px"
          title="Einstellungen"
        >
          ⚙️
        </button>
      </div>
    </div>

    <div class="main-content">
      <div class="container" style="position: relative">
        <!-- Legacy large Scannen button (removed because we have it in the top bar, or we can keep it as a main call to action) -->
        <a href="/scanner.html" class="live-scanner-btn"
          >📸 Live Scanner öffnen</a
        >

        <h2 style="margin-top: 10px">Upload</h2>

        <div id="drop-area" style="margin-top: 20px">
          <p>Datei(en) hier ablegen oder</p>
          <button id="browse-btn" class="action-button">
            Dateien auswählen
          </button>
          <input
            type="file"
            id="file-input"
            accept=".pdf,.jpeg,.jpg,.png"
            multiple
          />
        </div>

        <div id="status"></div>

        <div id="job-list-container" style="display: none">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-top: 20px;
            "
          >
            <h3 style="margin: 0">
              Upload Status
              <span
                id="active-job-count"
                style="
                  font-size: 14px;
                  font-weight: normal;
                  color: #666;
                  margin-left: 10px;
                "
              ></span>
            </h3>
            <button id="clear-jobs-btn" class="clear-btn">Liste leeren</button>
          </div>
          <div id="job-list"></div>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Einstellungen</h3>
          <button class="modal-close" id="closeSettingsBtn">&times;</button>
        </div>

        <div
          class="setting-group"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
          "
        >
          <div>
            <strong>Google Drive</strong>
            <div id="auth-status" class="text-muted" style="margin-left: 0">
              Status wird geladen...
            </div>
          </div>
          <button
            id="auth-btn"
            class="action-button"
            style="margin-top: 0; padding: 8px 15px; display: none"
          >
            Mit Google Anmelden
          </button>
        </div>

        <div
          class="setting-group"
          id="folder-settings-container"
          style="display: none"
        >
          <label>Ordner für rohe Uploads:</label>
          <div style="display: flex; gap: 10px">
            <input
              type="text"
              id="raw-folder-display"
              disabled
              placeholder="Kein Ordner ausgewählt"
              style="
                flex-grow: 1;
                min-width: 0;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 5px;
              "
            />
            <input type="hidden" id="raw-folder-id" />
            <button
              id="raw-folder-browse"
              class="action-button"
              disabled
              style="margin: 0; padding: 8px 15px; flex-shrink: 0"
            >
              Durchsuchen
            </button>
          </div>
          <div
            style="
              margin-top: 10px;
              display: flex;
              align-items: center;
              gap: 8px;
            "
          >
            <input
              type="checkbox"
              id="monitor-drive-checkbox"
              style="width: 18px; height: 18px"
            />
            <label
              for="monitor-drive-checkbox"
              style="
                margin: 0;
                font-weight: normal;
                font-size: 14px;
                cursor: pointer;
              "
              >Ordner automatisch auf neue Dateien überwachen (alle 15
              Sek)</label
            >
          </div>
        </div>

        <div
          class="setting-group"
          id="ai-folder-settings-container"
          style="display: none"
        >
          <label>Ordner für AI erkannte PDFs:</label>
          <div style="display: flex; gap: 10px">
            <input
              type="text"
              id="ai-folder-display"
              disabled
              placeholder="Kein Ordner ausgewählt"
              style="
                flex-grow: 1;
                min-width: 0;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 5px;
              "
            />
            <input type="hidden" id="ai-folder-id" />
            <button
              id="ai-folder-browse"
              class="action-button"
              disabled
              style="margin: 0; padding: 8px 15px; flex-shrink: 0"
            >
              Durchsuchen
            </button>
          </div>
        </div>

        <div
          class="setting-group"
          id="ai-prompt-settings-container"
          style="
            display: none;
            border-top: 1px solid #ddd;
            margin-top: 15px;
            padding-top: 15px;
          "
        >
          <label>KI Prompt Konfiguration:</label>
          <div style="margin-top: 10px">
            <label style="font-size: 0.9em; color: #555"
              >Kategorien (Komma-getrennt):</label
            >
            <textarea
              id="ai-categories-input"
              style="
                width: 100%;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 5px;
                resize: vertical;
              "
              rows="2"
              placeholder="Administration, Personal, Projekte..."
            ></textarea>
          </div>
          <div style="margin-top: 10px">
            <label style="font-size: 0.9em; color: #555"
              >Firmen / Rechnungsempfänger (Komma-getrennt):</label
            >
            <textarea
              id="ai-company-input"
              style="
                width: 100%;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 5px;
                resize: vertical;
              "
              rows="2"
              placeholder="wirewire GmbH, Daniel..."
            ></textarea>
          </div>
        </div>

        <button
          id="saveSettingsBtn"
          class="action-button"
          style="width: 100%; display: none; margin-top: 15px"
        >
          Einstellungen Speichern
        </button>
      </div>
    </div>

    <!-- Folder Browser Modal -->
    <div id="folder-browser-modal" class="modal-overlay" style="z-index: 2010">
      <div
        class="modal-content"
        style="
          display: flex;
          flex-direction: column;
          height: 80vh;
          max-height: 600px;
        "
      >
        <div class="modal-header">
          <h3>Ordner auswählen</h3>
          <button class="modal-close" id="closeFolderBrowserBtn">
            &times;
          </button>
        </div>
        <div
          id="fb-breadcrumbs"
          style="
            font-size: 14px;
            margin-bottom: 10px;
            color: #0d6efd;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
          "
        >
          <!-- Drive / Folder -->
        </div>
        <div
          id="fb-list"
          style="
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 5px;
            padding: 5px;
          "
        >
          <!-- .fb-item elements -->
        </div>
        <div
          style="
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <div
            id="fb-current-selection"
            style="
              font-size: 14px;
              font-weight: bold;
              color: #333;
              max-width: 60%;
              overflow: hidden;
              text-overflow: ellipsis;
              white-space: nowrap;
            "
          >
            Kein Ordner
          </div>
          <button
            id="fb-select-btn"
            class="action-button"
            style="margin: 0; padding: 8px 15px; background: #28a745"
          >
            Auswählen
          </button>
        </div>
      </div>
    </div>

    <!-- PWA Install Banner -->
    <div id="pwa-install-banner">
      <div class="pwa-text">
        <strong>App installieren</strong><br />
        Installieren als native App.
      </div>
      <div class="pwa-actions">
        <button id="pwa-install-btn" class="pwa-btn btn-install">
          Installieren
        </button>
        <button id="pwa-close-btn" class="pwa-btn btn-close-pwa">
          &times;
        </button>
      </div>
    </div>

    <script src="/index.js"></script>
  </body>
</html>
