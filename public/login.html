<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Scanner Login</title>

    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="theme-color" content="#f4f7f6" />
    <link rel="icon" href="/icon.svg?v=2" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg?v=2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Google Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Roboto Google Font for Material You -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/md3-theme.css" />
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <div class="container">
      <h2 style="margin-bottom: 8px;">Scanner Login</h2>
      <p class="text-secondary" style="font-size: 14px; margin-top: 0; margin-bottom: 24px;">
        Bitte Passwort eingeben, um fortzufahren.
      </p>
      <form id="loginForm">
        <div style="position: relative; width: 100%; display: flex; align-items: center;">
          <input
            type="password"
            id="password"
            placeholder="Passwort"
            required
            autofocus
            style="width: 100%; box-sizing: border-box;"
          />
          <span 
            class="material-symbols-outlined" 
            id="togglePassword" 
            style="position: absolute; right: 12px; cursor: pointer; color: var(--md-sys-color-on-surface-variant); user-select: none;">
            visibility
          </span>
        </div>
        <button type="submit">Anmelden</button>
        <span id="errorMsg" class="error"></span>
      </form>
    </div>

    <script src="/login.js"></script>
  </body>
</html>
