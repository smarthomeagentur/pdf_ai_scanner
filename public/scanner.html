<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dokumentenscanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff; margin: 0; padding: 0; display: block; }
        .scanner-container { max-width: 800px; width: 100%; margin: 0 auto; background: #fff; text-align: center; display: flex; flex-direction: column; min-height: 100vh; }
        .video-wrapper { position: relative; width: 100%; flex-grow: 1; flex-basis: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; background: #fff; }
        #video { width: 100%; height: 100%; max-height: 100%; object-fit: cover; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #loader { display: none; }
        .back-link { text-decoration: none; color: #495057; font-weight: bold; }
        .back-link:hover { color: #000; }
        #opencv-loading { color: #0d6efd; font-weight: bold; margin-top: 50px; }

        /* Scans Menu Sidebar */
        .scans-menu {
            position: fixed;
            top: 0; left: -100%;
            width: 85vw; max-width: 400px; height: 100vh;
            background: #fff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
            z-index: 1050; /* Über allem andern */
            padding: 20px;
            overflow-y: auto;
        }
        .scans-menu.open { left: 0; }
        
        .scan-item-label { display: flex; align-items: center; cursor: pointer; width: 100%; }
        .scan-thumb { width: 50px; height: 70px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; margin-right: 15px; background: #eee; }
        
        .overlay-bg {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1040;
        }
        .overlay-bg.show { display: block; }
        #server-upload-status { display: none; font-size: 0.9em;}
    </style>
</head>
<body>

<!-- Hintergrund Dark-Overlay wenn Menü auf -->
<div id="overlay-bg" class="overlay-bg" onclick="toggleMenu()"></div>

<!-- Seitenmenü mit allen bisher gescannten Dateien auf dem Server -->
<div id="scans-menu" class="scans-menu">
    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
        <h5 class="m-0">📂 Gespeicherte Scans</h5>
        <button class="btn-close" onclick="toggleMenu()"></button>
    </div>
    
    <div id="scan-list-container">
        <!-- Gefüllt über JS aus /api/scans -->
        <p class="text-muted small">Lade Dateien...</p>
    </div>

    <!-- Upload Button -->
    <button id="upload-selected-btn" class="btn btn-success w-100 mt-3" disabled>In die KI zum Sortieren pushen</button>
    <div id="server-upload-status" class="alert alert-info mt-2 p-2 text-center"></div>
</div>

<div class="scanner-container">
    <!-- Sticky Header -->
    <div class="sticky-top bg-white border-bottom shadow-sm d-flex justify-content-between align-items-center p-3">
        <a href="/" class="back-link m-0">&larr; Startseite</a>
        <button class="btn btn-sm btn-outline-primary" style="font-weight: bold;" onclick="toggleMenu()">📂 Auswahl & Upload</button>
    </div>

    <!-- Dropdown Einstellungen (Sticky directly below header) -->
    <details class="bg-light text-start shadow-sm position-sticky" style="top: 60px; z-index: 1020; border-bottom: 2px solid #ddd;">
        <summary class="text-secondary fw-bold p-3 m-0" style="cursor: pointer; background: #f8f9fa;">⚙️ Filtereinstellungen anzeigen</summary>
        <div class="px-3 pb-3 border-top pt-2">
            <label class="form-label fw-bold text-dark small mb-1">🎨 Bild-Filter (Backend)</label>
            <select id="algorithmSelect" class="form-select form-select-sm mb-2">
                <option value="white_paper" selected>Reinweißes Papier (Standard Scanner)</option>
                <option value="bw_adaptive">Schwarz/Weiß Hart (Quittungen / Kassenzettel)</option>
                <option value="clahe_sharp">Graustufen Schärfen (Besseres Detail bei dunkler Schrift)</option>
                <option value="grayscale">Einfache Graustufen (kein Filter)</option>
                <option value="color">Original in Farbe (unbearbeitet)</option>
            </select>

            <h6 class="text-secondary mt-2 mb-1 small fw-bold">📏 Kanten-Empfindlichkeit</h6>
            
            <label class="form-label mb-0 mt-1 small">Unschärfe: <span id="blurVal">5</span></label>
            <input type="range" class="form-range" style="height: 10px;" id="blurSlider" min="1" max="15" step="2" value="5">

            <label class="form-label mb-0 mt-1 small">Kanten 1: <span id="canny1Val">75</span></label>
            <input type="range" class="form-range" style="height: 10px;" id="canny1Slider" min="0" max="255" value="75">

            <label class="form-label mb-0 mt-1 small">Kanten 2: <span id="canny2Val">200</span></label>
            <input type="range" class="form-range" style="height: 10px;" id="canny2Slider" min="0" max="255" value="200">
        </div>
    </details>

    <div id="opencv-loading">
        <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div><br>
        Kamera & Optik werden geladen...
    </div>

    <!-- Video füllt den restlichen Bildschirm -->
    <div class="video-wrapper" id="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <!-- Review Section für manuelles Croppen -->
    <div id="manual-review-section" class="bg-white p-3 mt-auto" style="display: none; width: 100%; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); z-index: 1030; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1;">
        <h6 class="text-primary fw-bold mb-1"><span style="font-size: 1.2rem;">✏️</span> Kanten anpassen</h6>
        <p class="text-muted small mb-2">Punkte verschieben, um Scanbereich zu korrigieren.</p>
        
        <div style="position: relative; max-width: 100%; height: auto; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; background: #eee; display: inline-block;">
            <canvas id="reviewCanvas" style="max-width: 100%; max-height: 50vh; display: block; object-fit: contain;"></canvas>
            <canvas id="reviewOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; touch-action: none;"></canvas>
        </div>
        
        <div class="mt-3 d-flex w-100 gap-2 mb-3" style="max-width: 500px;">
            <button class="btn btn-outline-secondary w-50 py-2" id="cancelReviewBtn">Abbrechen</button>
            <button class="btn btn-success fw-bold w-50 py-2" id="confirmReviewBtn">Scan bestätigen</button>
        </div>
    </div>

    <!-- Scanner Info / Loader -->
    <div id="loader" class="mt-auto mb-5 p-4 bg-white" style="display: none; width: 100%; text-align: center;">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted" id="loader-status">Dokument wird beschnitten und OCR-verarbeitet...</p>
    </div>

    <!-- Floating Button für besseres Mobile-Bedienen -->
    <button id="captureBtn" class="btn btn-primary" style="display: none; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 999; max-width: 500px; width: calc(100% - 60px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 1.1rem; padding: 14px;" disabled>📸 Dokument scannen</button>
</div>

<!-- OpenCV.js asynchron laden -->
<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

<script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctxOverlay = overlay.getContext('2d');
    const videoWrapper = document.getElementById('video-wrapper');
    const captureBtn = document.getElementById('captureBtn');
    const loader = document.getElementById('loader');
    const loaderStatus = document.getElementById('loader-status');
    const loadingText = document.getElementById('opencv-loading');

    // UI-Slider Handler
    let optBlur = 5;
    let optCanny1 = 75;
    let optCanny2 = 200;

    document.getElementById('blurSlider').oninput = function() { optBlur = parseInt(this.value); document.getElementById('blurVal').innerText = optBlur; }
    document.getElementById('canny1Slider').oninput = function() { optCanny1 = parseInt(this.value); document.getElementById('canny1Val').innerText = optCanny1; }
    document.getElementById('canny2Slider').oninput = function() { optCanny2 = parseInt(this.value); document.getElementById('canny2Val').innerText = optCanny2; }

    let streaming = false;

    // Für die Kanten-Detektion wird das Bild auf eine kleine Arbeitskopie reduziert (Performance!)
    const processWidth = 320;
    const processHeight = 240;
    const canvasProcess = document.createElement('canvas');
    canvasProcess.width = processWidth;
    canvasProcess.height = processHeight;
    const ctxProcess = canvasProcess.getContext('2d', { willReadFrequently: true });

    let src, gray, blurred, edges, contours, hierarchy;
    let currentRelativeDocumentCorners = null; // Speichert Live die Ecken des Dokuments [x, y relative to Width/Height]

    // State Variablen für das "Glätten" der Positions-Erkennung (Anti-Flicker/Smoothing)
    let smoothedCornersRaw = null;
    let framesWithoutDetection = 0;
    const MAX_FRAMES_LOSE_TRACK = 12; // Halbe Sekunde Toleranz
    const SMOOTHING_FACTOR = 0.08; // Nur 8% vom neuen Frame aufnehmen (extrem starkes Glätten, "klebriger" Klebe-Effekt)

    // Hilfsfunktion, um die 4 Punkte in eine verlässliche Form zu Sortieren (Top-Left, Top-Right, Bottom-Right, Bottom-Left)
    function sortAndOrderCorners(ptsData32S) {
        let pts = [];
        for (let i = 0; i < 4; i++) {
            pts.push({ x: ptsData32S[i * 2], y: ptsData32S[i * 2 + 1] });
        }
        let cx = 0, cy = 0;
        pts.forEach(p => { cx += p.x; cy += p.y; });
        cx /= 4; cy /= 4;
        
        return pts.sort((a, b) => {
            return Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx);
        });
    }

    // 1. Wird aufgerufen, wenn OpenCV.js Datei heruntergeladen wurde
    function onOpenCvReady() {
        // Auf Initialisierung der WebAssembly-Umgebung warten
        cv['onRuntimeInitialized'] = () => {
            console.log("OpenCV initialized");
            loadingText.style.display = 'none';
            videoWrapper.style.display = 'block';
            captureBtn.style.display = 'block';
            startCamera();
        };
    }

    let videoTrack = null;

    async function startCamera() {
        try {
            // Wir fragen das Device nach der absolut höchsten Auflösung für Photo+Video
            // Wenn das Gerät "advanced" Einstellungen erlaubt, zwingen wir es in den Hi-Res Modus
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "environment", 
                    width: { ideal: 4096 }, // Versuch 4K Video Stream
                    height: { ideal: 2160 },
                    // Manche Browser unterstützen "advanced" Tags um die echten Sensor-Limits freizuschalten
                    advanced: [{ width: 4096, height: 2160 }] 
                },
                audio: false
            });
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            video.play();
        } catch (err) {
            // Fallback, wenn der Sensor die advanced Features nicht parsen kann
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                video.play();
            } catch (fallbackErr) {
                alert("Kamera konnte nicht gestartet werden: " + fallbackErr);
            }
        }
    }

    video.addEventListener('canplay', function() {
        if (!streaming && video.videoWidth > 0) {
            // Overlay and drawing must match the ACTUAL display size, not the internal video size,
            // because we use object-fit: cover which crops the visual representation.
            const rect = video.getBoundingClientRect();
            overlay.width = rect.width;
            overlay.height = rect.height;
            streaming = true;
            captureBtn.disabled = false;
            
            // Handle window resize dynamically to keep canvas tracking over video feed
            window.addEventListener('resize', () => {
                if (streaming && video) {
                    const newRect = video.getBoundingClientRect();
                    overlay.width = newRect.width;
                    overlay.height = newRect.height;
                }
            });

            // OpenCV Matrizen einmalig anlegen für Memory Management
            src = new cv.Mat(processHeight, processWidth, cv.CV_8UC4);
            gray = new cv.Mat();
            blurred = new cv.Mat();
            edges = new cv.Mat();
            hierarchy = new cv.Mat();
            contours = new cv.MatVector();

            // Starte Detektions-Schleife
            requestAnimationFrame(processVideo);
        }
    });

    function processVideo() {
        if (!streaming) return;

        try {
            // Because video uses object-fit: cover, the displayed center is cropped from the native 16:9/4:3 stream.
            // We calculate scaling to properly feed ONLY the visible part of the stream into OpenCV.
            const rect = video.getBoundingClientRect();
            const wScale = video.videoWidth / rect.width;
            const hScale = video.videoHeight / rect.height;
            const scale = Math.min(wScale, hScale);

            const sWidth = rect.width * scale;
            const sHeight = rect.height * scale;
            const sx = (video.videoWidth - sWidth) / 2;
            const sy = (video.videoHeight - sHeight) / 2;

            // Video-Frame (nur den sichtbaren Teil!) auf unsere OpenCV Arbeitsfläche zeichnen
            ctxProcess.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, processWidth, processHeight);
            
            // Frame an OpenCV übergeben
            let imageData = ctxProcess.getImageData(0, 0, processWidth, processHeight);
            src.data.set(imageData.data);

            // Bildbearbeitung für Dokumentensuche (Graustufe, Unschärfe, Kanten)
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
            
            // Dynamischer Blur (Glättung) um kleine Störungen zu filtern (Wert z.B. 5x5)
            cv.GaussianBlur(gray, blurred, new cv.Size(optBlur, optBlur), 0, 0, cv.BORDER_DEFAULT);
            cv.Canny(blurred, edges, optCanny1, optCanny2);

            // WICHTIG: Kanten dicker machen ("Dilatation"), damit Linien bei Kontrastschwäche der Handykamera nicht abreißen
            let kernel = cv.Mat.ones(5, 5, cv.CV_8U);
            cv.dilate(edges, edges, kernel);
            cv.erode(edges, edges, kernel);
            kernel.delete();

            // Konturen finden
            cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

            let maxArea = 0;
            let bestCnt = null;

            // Finde das größte Viereck im Bild
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                
                // Ignoriere kleine Boxen unter 15% Screen-Größe (blockt Rauschen, Tassen oder Tastaturen extrem gut ab)
                if (area > (processWidth * processHeight * 0.05)) { 
                    let peri = cv.arcLength(cnt, true);
                    let approx = new cv.Mat();
                    // Toleranz erhöhen auf 0.08 für grobere Vierecke (damit runde Blattecken als gerade interpretiert werden)
                    cv.approxPolyDP(cnt, approx, 0.08 * peri, true);
                    
                    if (approx.rows === 4 && area > maxArea && cv.isContourConvex(approx)) {
                        // Berechne die Winkel zwischen allen 4 Kanten
                        // Wenn der maximale Cosinus zwischen zwei Vektoren sehr hoch ist (nahe 1), ist die Ecke enorm Spitz! Ein Dokument ist das sicher nicht.
                        let maxCosine = 0;
                        for (let j = 2; j < 6; j++) {
                            let pt1Source = (j % 4) * 2; let pt2Source = ((j - 2) % 4) * 2; let pt0Source = ((j - 1) % 4) * 2;
                            let pt1 = { x: approx.data32S[pt1Source], y: approx.data32S[pt1Source + 1] };
                            let pt2 = { x: approx.data32S[pt2Source], y: approx.data32S[pt2Source + 1] };
                            let pt0 = { x: approx.data32S[pt0Source], y: approx.data32S[pt0Source + 1] };
                            
                            let dx1 = pt1.x - pt0.x; let dy1 = pt1.y - pt0.y;
                            let dx2 = pt2.x - pt0.x; let dy2 = pt2.y - pt0.y;
                            // Skalarprodukt für Cosinus des Winkels
                            let cosine = Math.abs((dx1*dx2 + dy1*dy2) / Math.sqrt((dx1*dx1 + dy1*dy1)*(dx2*dx2 + dy2*dy2) + 1e-10));
                            maxCosine = Math.max(maxCosine, cosine);
                        }

                        // Filter: Cosinus muss unter einem Schwellwert (z.B. <0.8, entspricht ~35-145 Grad Ecken beim Papier) bleiben
                        if (maxCosine < 0.82) {
                            maxArea = area;
                            if (bestCnt) bestCnt.delete();
                            bestCnt = approx.clone();
                        }
                    }
                    approx.delete();
                }
            }

            // --- SMOOTHING / ANTI-FLICKERING LOGIK ---
            if (bestCnt) {
                framesWithoutDetection = 0;
                let sortedNewCorners = sortAndOrderCorners(bestCnt.data32S);
                
                if (!smoothedCornersRaw) {
                    smoothedCornersRaw = sortedNewCorners;
                } else {
                    for(let i=0; i<4; i++){
                        smoothedCornersRaw[i].x = smoothedCornersRaw[i].x * (1 - SMOOTHING_FACTOR) + sortedNewCorners[i].x * SMOOTHING_FACTOR;
                        smoothedCornersRaw[i].y = smoothedCornersRaw[i].y * (1 - SMOOTHING_FACTOR) + sortedNewCorners[i].y * SMOOTHING_FACTOR;
                    }
                }
                bestCnt.delete();
            } else {
                framesWithoutDetection++;
                // Vergiss das Quadrat, wenn es für X Frames (MAX) komplett verschwunden ist
                if(framesWithoutDetection > MAX_FRAMES_LOSE_TRACK) {
                    smoothedCornersRaw = null;
                }
            }

            // Zeichenfläche leeren
            ctxOverlay.clearRect(0, 0, overlay.width, overlay.height);

            // Wenn wir (noch) über ein valides Quadrat (durch Smoothing) verfügen, zeichne es
            if (smoothedCornersRaw) {
                currentRelativeDocumentCorners = [];
                ctxOverlay.beginPath();
                for (let i = 0; i < 4; i++) {
                    // Punkt relativ speichern
                    let relativeX = smoothedCornersRaw[i].x / processWidth;
                    let relativeY = smoothedCornersRaw[i].y / processHeight;
                    currentRelativeDocumentCorners.push({ x: relativeX, y: relativeY});

                    // Hochrechnen
                    let x = relativeX * overlay.width;
                    let y = relativeY * overlay.height;
                    
                    if (i === 0) {
                        ctxOverlay.moveTo(x, y);
                    } else {
                        ctxOverlay.lineTo(x, y);
                    }
                }
                ctxOverlay.closePath();
                ctxOverlay.lineWidth = 4;
                ctxOverlay.strokeStyle = 'rgba(40, 167, 69, 0.9)';
                ctxOverlay.fillStyle = 'rgba(40, 167, 69, 0.2)';
                ctxOverlay.fill();
                ctxOverlay.stroke();
            } else {
                currentRelativeDocumentCorners = null;
            }
        } catch (err) {
            console.error("OpenCV Verarbeitung:", err);
        }
        
        // Nächster Frame Timer
        requestAnimationFrame(processVideo);
    }

    captureBtn.addEventListener('click', async () => {
        if (!streaming) return;
        // Ecken sofort beim Klick wegspeichern ("einfrieren"), 
        // da das Auslösen des Sensors per await ein paar Millisekunden dauert 
        // und das Bild durch Verwackeln sonst verloren ginge!
        let frozenCorners = currentRelativeDocumentCorners ? JSON.parse(JSON.stringify(currentRelativeDocumentCorners)) : null;
        captureBtn.disabled = true;
        loader.style.display = 'block';
        loaderStatus.innerText = "Dokumentbereich für lokalen Zuschnitt wird berechnet...";

        let originalWidth = video.videoWidth;
        let originalHeight = video.videoHeight;
        let photoWasUsed = false;
        let highResBitmap = null;

        // Versuche über aktuelle ImageCapture API die echte volle Foto-Sensor-Auflösung abzurufen
        if (window.ImageCapture && videoTrack) {
            try {
                const imageCapture = new ImageCapture(videoTrack);
                loaderStatus.innerText = "Foto in Höchstauflösung wird belichtet...";
                const blob = await imageCapture.takePhoto(); 
                highResBitmap = await createImageBitmap(blob);
                originalWidth = highResBitmap.width;
                originalHeight = highResBitmap.height;
                photoWasUsed = true;
                console.log(`Echte Fotosensor-Auflösung genutzt: ${originalWidth}x${originalHeight} gegenüber Video: ${video.videoWidth}x${video.videoHeight}`);
            } catch (e) {
                console.warn("Fotofunktion nicht per API abrufbar, falle zurück auf Video Capture", e);
            }
        }

        const canvasHighRes = document.createElement('canvas');
        
        if (photoWasUsed) {
            // Wir übergeben das gesamte unbeschnittene Sensor-Bild in den manuellen Review (für bestes Cropping).
            canvasHighRes.width = originalWidth;
            canvasHighRes.height = originalHeight;
            const ctxHighRes = canvasHighRes.getContext('2d');
            ctxHighRes.drawImage(highResBitmap, 0, 0);

            // NEU: Da Video-Live-Ansicht auf Smartphones oft herangezoomt ist (FOV/EIS Crop), 
            // stimmen die während des Videos getrackten 'frozenCorners' nicht mehr mit dem unbeschnittenen Hardwarefoto überein.
            // Lösung: Wir jagen das fertig geschossene, verwacklungsfreie Foto einfach blitzschnell noch 1x durch unsere exakte OpenCV Erkennung!
            if (frozenCorners) {
                // Führe eine einmalige Erkennung auf dem statischen Hochauflösungsbild aus. 
                // Gelingt dies, überschreibt es die Videokoordinaten punktgenau.
                frozenCorners = detectCornersInHighRes(canvasHighRes, frozenCorners);
            }

        } else {
            // FALLBACK auf Videostream-Ausschnitt, wenn kein raw Foto genutzt werden konnte
            let cropWidth = originalWidth;
            let cropHeight = originalHeight;
            let sourceX = 0;
            let sourceY = 0;

            if (streaming && video) {
                const rect = video.getBoundingClientRect();
                const vScale = Math.min(originalWidth / rect.width, originalHeight / rect.height);
                cropWidth = rect.width * vScale;
                cropHeight = rect.height * vScale;
                sourceX = (originalWidth - cropWidth) / 2;
                sourceY = (originalHeight - cropHeight) / 2;
            }
            
            canvasHighRes.width = cropWidth;
            canvasHighRes.height = cropHeight;
            const ctxHighRes = canvasHighRes.getContext('2d');
            ctxHighRes.drawImage(video, sourceX, sourceY, cropWidth, cropHeight, 0, 0, canvasHighRes.width, canvasHighRes.height);
            // Die bereits gespeicherten relativen frozenCorners stimmen hierbei noch, weil das Bild wie vom user gesehen exakt beschnitten wird.
        }

        // Falls absolut kein Dokument gefunden
        if (!frozenCorners) {
            frozenCorners = [
                {x: 0.1, y: 0.1}, {x: 0.9, y: 0.1}, {x: 0.9, y: 0.9}, {x: 0.1, y: 0.9}
            ];
        }

        // Zeige Editier-Ansicht ("Manual Review")
        showManualReview(canvasHighRes, frozenCorners);
    });

    // --- NEU: Dokument im fertigen XXL Foto kurz neu erkennen, um FOV-Probleme (Video-Zoom) zu vermeiden ---
    function detectCornersInHighRes(highResCanvas, fallbackCorners) {
        try {
            // Wir nutzen die existierende OpenCV-Arbeitsfläche für einen kurzen Scan des Fotos
            ctxProcess.drawImage(highResCanvas, 0, 0, processWidth, processHeight);
            let imageData = ctxProcess.getImageData(0, 0, processWidth, processHeight);
            src.data.set(imageData.data);

            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
            cv.GaussianBlur(gray, blurred, new cv.Size(optBlur, optBlur), 0, 0, cv.BORDER_DEFAULT);
            cv.Canny(blurred, edges, optCanny1, optCanny2);

            let kernel = cv.Mat.ones(5, 5, cv.CV_8U);
            cv.dilate(edges, edges, kernel);
            cv.erode(edges, edges, kernel);
            kernel.delete();

            cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

            let maxArea = 0;
            let bestCntRaw = null;

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area > (processWidth * processHeight * processMinArea)) {
                    let peri = cv.arcLength(cnt, true);
                    cv.approxPolyDP(cnt, approx, 0.08 * peri, true);
                    if (approx.rows === 4) {
                        let maxCosine = 0;
                        for (let j = 2; j < 6; j++) {
                            let pt1Source = (j % 4) * 2; let pt2Source = ((j - 2) % 4) * 2; let pt0Source = ((j - 1) % 4) * 2;
                            let pt1 = { x: approx.data32S[pt1Source], y: approx.data32S[pt1Source + 1] };
                            let pt2 = { x: approx.data32S[pt2Source], y: approx.data32S[pt2Source + 1] };
                            let pt0 = { x: approx.data32S[pt0Source], y: approx.data32S[pt0Source + 1] };
                            let dx1 = pt1.x - pt0.x; let dy1 = pt1.y - pt0.y;
                            let dx2 = pt2.x - pt0.x; let dy2 = pt2.y - pt0.y;
                            let cosine = Math.abs((dx1*dx2 + dy1*dy2) / Math.sqrt((dx1*dx1 + dy1*dy1)*(dx2*dx2 + dy2*dy2) + 1e-10));
                            maxCosine = Math.max(maxCosine, cosine);
                        }
                        if (maxCosine < 0.82) {
                            maxArea = area;
                            if (bestCntRaw) bestCntRaw.delete();
                            bestCntRaw = approx.clone();
                        }
                    }
                    approx.delete();
                }
            }

            if (bestCntRaw) {
                let sorted = sortAndOrderCorners(bestCntRaw.data32S);
                bestCntRaw.delete();
                
                // Konvertiere in relative Koordinaten
                return sorted.map(c => ({
                    x: c.x / processWidth,
                    y: c.y / processHeight
                }));
            }
        } catch (e) {
            console.error("Fehler bei Photo-Rescan", e);
        }
        return fallbackCorners;
    }

    let reviewState = {
        highResCanvas: null,
        cropX: 0, cropY: 0, cropW: 0, cropH: 0,
        corners: [], // Kanten bezogen auf das ReviewCanvas
        activeCorner: -1
    };

    function showManualReview(highResCanvas, relativeCorners) {
        // Pausiere Kameraanzeige
        document.getElementById('video-wrapper').style.display = 'none';
        document.getElementById('captureBtn').style.display = 'none';
        document.getElementById('manual-review-section').style.display = 'flex';
        
        reviewState.highResCanvas = highResCanvas;

        // Finde die absoluten Grenzen (Min/Max X und Y) der markierten Ecken im Originalbild, um den Rand zu berechnen
        let xs = relativeCorners.map(c => c.x * highResCanvas.width);
        let ys = relativeCorners.map(c => c.y * highResCanvas.height);
        let minX = Math.min(...xs), maxX = Math.max(...xs);
        let minY = Math.min(...ys), maxY = Math.max(...ys);

        // Füge 15% Puffer um den erkannten Rahmen hinzu, damit der User noch etwas "außerhalb" sieht
        let padX = (maxX - minX) * 0.15;
        let padY = (maxY - minY) * 0.15;

        reviewState.cropX = Math.max(0, minX - padX);
        reviewState.cropY = Math.max(0, minY - padY);
        reviewState.cropW = Math.min(highResCanvas.width - reviewState.cropX, (maxX - minX) + 2 * padX);
        reviewState.cropH = Math.min(highResCanvas.height - reviewState.cropY, (maxY - minY) + 2 * padY);

        // Lade diesen Puffer-Zuschnitt in den ReviewCanvas
        const rCv = document.getElementById('reviewCanvas');
        rCv.width = reviewState.cropW;
        rCv.height = reviewState.cropH;
        rCv.getContext('2d').drawImage(highResCanvas, reviewState.cropX, reviewState.cropY, reviewState.cropW, reviewState.cropH, 0, 0, reviewState.cropW, reviewState.cropH);

        // Passe Overlay (Zeichenfläche) exakt auf das Canvas an
        const oCv = document.getElementById('reviewOverlay');
        oCv.width = reviewState.cropW;
        oCv.height = reviewState.cropH;

        // Rechne die 4 Originalecken in das lokale (abgeschnittene) Review-Bild um
        reviewState.corners = relativeCorners.map(c => ({
            x: (c.x * highResCanvas.width) - reviewState.cropX,
            y: (c.y * highResCanvas.height) - reviewState.cropY
        }));

        drawReviewOverlay();
    }

    function drawReviewOverlay() {
        const ctx = document.getElementById('reviewOverlay').getContext('2d');
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

        // Grün schimmerndes Polygon
        ctx.beginPath();
        ctx.moveTo(reviewState.corners[0].x, reviewState.corners[0].y);
        for(let i=1; i<4; i++) ctx.lineTo(reviewState.corners[i].x, reviewState.corners[i].y);
        ctx.closePath();
        ctx.lineWidth = 2; // Dünner, da man jetzt nah rangezoomt hat
        ctx.strokeStyle = '#28a745';
        ctx.fillStyle = 'rgba(40, 167, 69, 0.15)';
        ctx.fill();
        ctx.stroke();

        // 4 Weiße Anfass-Punkte mit grünen Kernen
        reviewState.corners.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 20, 0, 2*Math.PI);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(c.x, c.y, 6, 0, 2*Math.PI);
            ctx.fillStyle = '#28a745';
            ctx.fill();
        });
    }

    // Touch & Mouse Handler für das Verschieben der Ecken
    const reviewOverlay = document.getElementById('reviewOverlay');

    function getInternalPos(e) {
        const rect = reviewOverlay.getBoundingClientRect();
        const scaleX = reviewOverlay.width / rect.width;
        const scaleY = reviewOverlay.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function onDragStart(e) {
        e.preventDefault();
        const pos = getInternalPos(e);
        reviewState.activeCorner = -1;
        for (let i = 0; i < 4; i++) {
            // Großer "Fangradius" von 50px (virtuell) für dicke Finger auf Handys
            if (Math.hypot(reviewState.corners[i].x - pos.x, reviewState.corners[i].y - pos.y) < 50) {
                reviewState.activeCorner = i;
                break;
            }
        }
    }

    function onDragMove(e) {
        if (reviewState.activeCorner === -1) return;
        e.preventDefault();
        const pos = getInternalPos(e);
        // Position clampen, damit Ecke nicht aus dem Zoom-Bild geschoben wird
        reviewState.corners[reviewState.activeCorner].x = Math.max(0, Math.min(reviewOverlay.width, pos.x));
        reviewState.corners[reviewState.activeCorner].y = Math.max(0, Math.min(reviewOverlay.height, pos.y));
        drawReviewOverlay();
    }

    function onDragEnd(e) {
        reviewState.activeCorner = -1;
    }

    reviewOverlay.addEventListener('mousedown', onDragStart);
    reviewOverlay.addEventListener('mousemove', onDragMove);
    reviewOverlay.addEventListener('mouseup', onDragEnd);
    reviewOverlay.addEventListener('mouseleave', onDragEnd);
    reviewOverlay.addEventListener('touchstart', onDragStart, {passive: false});
    reviewOverlay.addEventListener('touchmove', onDragMove, {passive: false});
    reviewOverlay.addEventListener('touchend', onDragEnd);

    // Klick auf "Abbrechen"
    document.getElementById('cancelReviewBtn').addEventListener('click', () => {
        document.getElementById('manual-review-section').style.display = 'none';
        document.getElementById('video-wrapper').style.display = 'flex';
        document.getElementById('captureBtn').style.display = 'block';
        document.getElementById('captureBtn').disabled = false;
    });

    // Klick auf "Scan bestätigen" -> Abschließende Berechnung und Hochladen
    document.getElementById('confirmReviewBtn').addEventListener('click', () => {
        document.getElementById('manual-review-section').style.display = 'none';
        loader.style.display = 'block';
        loaderStatus.innerText = "Dokument wird entzerrt und hochgeladen...";

        // Rückrechnung der modifizierten lokalen Crop-Punkte auf das Originale Mega-Pixel-Speicherbild
        let finalAbsoluteCorners = reviewState.corners.map(c => ({
            x: c.x + reviewState.cropX,
            y: c.y + reviewState.cropY
        }));

        let srcMat = cv.imread(reviewState.highResCanvas);
        let ptsArray = [];
        for (let i = 0; i < 4; i++) {
            ptsArray.push(finalAbsoluteCorners[i].x);
            ptsArray.push(finalAbsoluteCorners[i].y);
        }
        
        let [tlX, tlY, trX, trY, brX, brY, blX, blY] = ptsArray;
        
        // Max. Kantenlängen kalkulieren für quadratische Streckung
        let widthA = Math.sqrt(Math.pow(brX - blX, 2) + Math.pow(brY - blY, 2));
        let widthB = Math.sqrt(Math.pow(trX - tlX, 2) + Math.pow(trY - tlY, 2));
        let maxWidth = Math.max(widthA, widthB);
        let heightA = Math.sqrt(Math.pow(trX - brX, 2) + Math.pow(trY - brY, 2));
        let heightB = Math.sqrt(Math.pow(tlX - blX, 2) + Math.pow(tlY - blY, 2));
        let maxHeight = Math.max(heightA, heightB);
        
        let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, ptsArray);
        let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
            0, 0,
            maxWidth - 1, 0,
            maxWidth - 1, maxHeight - 1,
            0, maxHeight - 1
        ]);
        
        let M = cv.getPerspectiveTransform(srcTri, dstTri);
        let dstMat = new cv.Mat();
        let dsize = new cv.Size(maxWidth, maxHeight);
        
        cv.warpPerspective(srcMat, dstMat, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
        
        // Gecropptes und entzerrtes Bild erzeugen
        let finalImageCanvas = document.createElement('canvas');
        cv.imshow(finalImageCanvas, dstMat);
        
        srcMat.delete(); dstMat.delete(); M.delete(); srcTri.delete(); dstTri.delete();

        // Canvas an Server API pushen
        finalImageCanvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('image', blob, 'live_scan.jpg');
            // Da wir definitiv gecropped haben, setzen wir das Backend Flag
            formData.append('coords', 'frontend_cropped');
            formData.append('algorithm', document.getElementById('algorithmSelect').value);

            try {
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const pdfBlob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(pdfBlob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `Scanned_Document_${new Date().toISOString().slice(0, 10)}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    
                    loaderStatus.innerText = "Fertig! Speichern erfolgreich.";
                    loadSavedScans();

                    setTimeout(() => {
                        loader.style.display = 'none';
                        document.getElementById('video-wrapper').style.display = 'flex';
                        document.getElementById('captureBtn').style.display = 'block';
                        document.getElementById('captureBtn').disabled = false;
                    }, 2500);
                } else {
                    const errorData = await response.json();
                    alert("Konnte nicht gescannt werden: " + (errorData.error || "Unbekannt"));
                    loader.style.display = 'none';
                    document.getElementById('video-wrapper').style.display = 'flex';
                    document.getElementById('captureBtn').style.display = 'block';
                    document.getElementById('captureBtn').disabled = false;
                }
            } catch (error) {
                alert("Netzwerkfehler.");
                loader.style.display = 'none';
                document.getElementById('video-wrapper').style.display = 'flex';
                document.getElementById('captureBtn').style.display = 'block';
                document.getElementById('captureBtn').disabled = false;
            }
        }, 'image/jpeg', 0.95);
    });

    // Menü-Steuerung
    function toggleMenu() {
        const menu = document.getElementById('scans-menu');
        const bg = document.getElementById('overlay-bg');
        if (menu.classList.contains('open')) {
            menu.classList.remove('open');
            bg.classList.remove('show');
        } else {
            menu.classList.add('open');
            bg.classList.add('show');
            loadSavedScans();
        }
    }

    // Scans laden
    async function loadSavedScans() {
        try {
            const resp = await fetch('/api/scans');
            const data = await resp.json();
            let html = "";
            let htmlForm = "<form id='scanSelectionForm'>";

            if(!data.files || data.files.length === 0) {
               html = '<p class="text-muted small">Noch keine Scans vorhanden.</p>';
            } else {
               data.files.forEach((f, idx) => {
                  let imgHtml = f.hasThumbnail ? 
                    `<img src="/downloads/${f.name.replace('.pdf', '.jpg')}" class="scan-thumb" onerror="this.style.display='none'"/>` : 
                    `<div class="scan-thumb d-flex justify-content-center align-items-center bg-light border"><small class="text-muted">PDF</small></div>`;
                    
                  htmlForm += `
                  <div class="form-check border-bottom pb-3 mb-2 d-flex align-items-center">
                      <input class="form-check-input me-3" type="checkbox" name="scans" value="${f.name}" id="scan_${idx}" onchange="checkSelections()" style="transform: scale(1.5);">
                      <label class="form-check-label scan-item-label" for="scan_${idx}">
                          ${imgHtml}
                          <div style="line-height:1.2; word-break: break-all;">
                              <strong>📄 ${f.name.replace('Scanned_', '').replace('.pdf','')}</strong><br>
                              <small class="text-muted">${new Date(f.date).toLocaleDateString()} ${new Date(f.date).toLocaleTimeString()} - ${(f.size/1024).toFixed(1)} kb</small>
                          </div>
                      </label>
                  </div>`;
               });
               htmlForm += "</form>";
            }

            document.getElementById('scan-list-container').innerHTML = html || htmlForm;
            checkSelections();
        } catch(e) {
            console.error(e);
        }
    }

    // Zeigt den Upload-Button, wenn was ausgewählt wurde
    function checkSelections() {
        const checkboxes = document.querySelectorAll('input[name="scans"]:checked');
        const btn = document.getElementById('upload-selected-btn');
        if(btn) {
           btn.disabled = checkboxes.length === 0;
           btn.innerText = `Hochladen (${checkboxes.length})`;
        }
    }

    // Ausgewählte PDFs an die Upload-Pipeline in index.js pingen
    document.getElementById('upload-selected-btn')?.addEventListener('click', async () => {
        const checkboxes = document.querySelectorAll('input[name="scans"]:checked');
        const selectedFiles = Array.from(checkboxes).map(c => c.value);
        
        if (selectedFiles.length === 0) return;

        const info = document.getElementById('server-upload-status');
        const btn = document.getElementById('upload-selected-btn');
        btn.disabled = true;

        info.style.display = 'block';
        info.innerText = 'Übertrage ' + selectedFiles.length + ' Datei(en) in die AI Pipeline...';

        try {
            const response = await fetch('/api/upload-scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filenames: selectedFiles })
            });

            if (response.ok) {
                const resData = await response.json();
                
                // Jobs im LocalStorage ablegen, damit das Start-Portal die Queue sofort kennt!
                if (resData.jobs) {
                    let activeJobs = JSON.parse(localStorage.getItem('uploadJobs') || '[]');
                    activeJobs.push(...resData.jobs);
                    localStorage.setItem('uploadJobs', JSON.stringify(activeJobs));
                }

                info.innerText = 'Erfolgreich! Leite zum Upload-Portal weiter...';
                info.classList.replace('alert-info', 'alert-success');
                
                // Sobald erfolgreich: Seite wechseln!
                setTimeout(() => {
                    window.location.href = '/';
                }, 800);
                
            } else {
                info.innerText = 'Fehler beim Übergeben an die Pipeline.';
                info.classList.replace('alert-info', 'alert-danger');
            }
        } catch (e) {
            info.innerText = 'Server Verbindungsfehler.';
            info.classList.replace('alert-info', 'alert-danger');
        }
        
        setTimeout(() => {
            info.style.display = 'none';
        }, 5000);
    });

</script>
