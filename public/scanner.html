<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Live Dokumentenscanner</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="/icon.svg?v=2" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg?v=2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Scanner" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/scanner.css?v=1777396912" />
  </head>
  <body>
    <div class="scanner-container">
      <!-- Sticky Header -->
      <div
        class="sticky-top bg-white border-bottom shadow-sm d-flex justify-content-between align-items-center p-3"
      >
        <a href="/" class="back-link m-0">&larr; Home</a>
        <div class="d-flex gap-2">
          <button
            id="autoCaptureBtn"
            class="btn btn-sm btn-primary"
            style="
              font-weight: bold;
              font-size: 1.1rem;
              padding: 2px 8px;
              border-radius: 6px;
            "
            title="Auto-Capture (An/Aus)"
          >
            AutoScan: An
          </button>
          <button
            class="btn btn-sm btn-outline-secondary"
            onclick="
              document.getElementById('filterMenu').open =
                !document.getElementById('filterMenu').open
            "
            style="font-size: 1.1rem; padding: 2px 8px; border-radius: 6px"
          >
            ⚙️
          </button>
        </div>
      </div>

      <!-- Dropdown Einstellungen (Sticky directly below header) -->
      <details
        id="filterMenu"
        class="bg-light text-start shadow-sm position-sticky"
        style="top: 60px; z-index: 1020; border-bottom: 2px solid #ddd"
      >
        <summary
          class="text-secondary fw-bold p-3 m-0"
          style="cursor: pointer; background: #f8f9fa; display: none"
        >
          ⚙️ Filtereinstellungen anzeigen
        </summary>
        <div class="px-3 pb-3 border-top pt-2">
          <!-- Bild-Filter ist jetzt exklusiv im Preview-Screen. Intern halten wir den State fest: -->
          <input type="hidden" id="algorithmSelect" value="auto" />

          <h6 class="text-secondary mt-3 mb-2 small fw-bold">
            Scanner Einstellung
          </h6>

          <label class="form-label mb-0 mt-1 small"
            >Dokumentenerkennung: <span id="sensitivityVal">50%</span></label
          >
          <input
            type="range"
            class="modern-slider"
            id="sensitivitySlider"
            min="0"
            max="100"
            value="50"
          />

          <label class="form-label mb-0 mt-1 small"
            >Rahmen-Trägheit (Anti-Flicker):
            <span id="smoothingVal">20%</span></label
          >
          <input
            type="range"
            class="modern-slider"
            id="smoothingSlider"
            min="1"
            max="100"
            value="20"
          />

          <hr class="my-3" />
          <h6 class="text-secondary mb-2 small fw-bold">Weitere Optionen</h6>
          <!-- Die Optionen wurden gemäß Audit entfernt. AutoQueue (KI Pipeline) ist nun via Button geregelt -->
        </div>
      </details>

      <div id="opencv-loading">
        <div
          class="spinner-border spinner-border-sm text-primary mb-2"
          role="status"
        ></div>
        <br />
        Kamera & Optik werden geladen...
      </div>

      <!-- Video füllt den restlichen Bildschirm -->
      <div class="video-wrapper" id="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
      </div>

      <!-- Review Section für manuelles Croppen -->
      <div
        id="manual-review-section"
        class="bg-white p-3 mt-auto"
        style="
          display: none;
          position: relative;
          width: 100%;
          box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.1);
          z-index: 1030;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          flex-grow: 1;
        "
      >
        <!-- Close button (Abbrechen) oben rechts absolut positioniert im Review-Panel -->
        <button
          id="cancelReviewCrossBtn"
          class="btn btn-sm btn-outline-secondary position-absolute"
          style="top: 15px; right: 15px; padding: 4px 10px; border-radius: 50%; font-weight: bold; z-index: 1040;"
          title="Schließen"
        >
          ✕
        </button>

        <div
          style="
            position: relative;
            max-width: 100%;
            height: auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #eee;
            display: inline-block;
          "
        >
          <canvas
            id="reviewCanvas"
            style="
              max-width: 100%;
              max-height: 65vh;
              display: block;
              object-fit: contain;
            "
          ></canvas>
          <canvas
            id="reviewOverlay"
            style="
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              z-index: 20;
              touch-action: none;
            "
          ></canvas>
        </div>

        <div
          id="previewLoadingText"
          class="text-primary mt-2 fw-bold"
          style="display: none; font-size: 0.9em"
        >
          <span
            class="spinner-border spinner-border-sm me-1"
            role="status"
            aria-hidden="true"
          ></span>
          Warten auf Vorschau...
        </div>

        <div
          class="mt-3 w-100 d-flex justify-content-center flex-column gap-2"
          style="max-width: 500px"
        >
          <div class="input-group mb-2 shadow-sm">
            <span
              class="input-group-text bg-light fw-bold"
              style="font-size: 0.9em"
              >🎨 Filter</span
            >
            <select
              id="previewAlgorithmSelect"
              class="form-select text-primary fw-bold"
              style="font-size: 0.9em"
              onchange="
                document.getElementById('algorithmSelect').value = this.value;
                updatePreviewFilter();
              "
            >
              <option value="auto">✨ Auto-Erkennung (Empfohlen)</option>
              <option value="color_enhanced">Optimiert Farbe</option>
              <option value="white_paper">Optimiert SW</option>
              <option value="bw_adaptive">
                SW Hart (Quittungen / Kassenzettel)
              </option>
              <option value="grayscale">Original Graustufen</option>
              <option value="color">Original Farbe</option>
            </select>
          </div>

          <div class="d-flex gap-2 w-100">
            <button
              class="btn btn-secondary w-50 py-2 fw-bold text-white shadow-sm"
              id="rescanBtn"
              style="font-size: 0.95em"
            >
              Kantenerkennung
            </button>
            <button
              class="btn btn-primary w-50 py-2 fw-bold shadow-sm"
              id="addPageBtn"
              style="font-size: 0.95em"
            >
              Nächste Seite
            </button>
          </div>
        </div>

        <div
          class="d-flex w-100 gap-2 mb-3 mt-3 position-relative"
          style="
            max-width: 500px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
          "
        >
          <button
            class="btn btn-secondary py-2 shadow-sm text-white fw-bold"
            id="downloadOnlyBtn"
            style="flex: 1;"
          >
            Download
          </button>
          <button
            class="btn btn-success py-2 shadow-sm fw-bold"
            style="flex: 2; font-size: 1.05em"
            id="finishScanBtn"
          >
            Verarbeiten
          </button>
        </div>
      </div>

      <!-- Scanner Info / Loader -->
      <div
        id="loader"
        class="mt-auto mb-5 p-4 bg-white"
        style="display: none; width: 100%; text-align: center"
      >
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted" id="loader-status">
          Dokument wird beschnitten und OCR-verarbeitet...
        </p>
      </div>

      <!-- Großer Auto-Countdown Indikator -->
      <div
        id="auto-countdown"
        style="
          display: none;
          position: fixed;
          top: 40%;
          left: 50%;
          transform: translate(-50%, -50%);
          z-index: 1015;
          font-size: 15vw;
          color: white;
          font-weight: bold;
          text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
          pointer-events: none;
        "
      >
        2
      </div>

      <!-- Floating Button für besseres Mobile-Bedienen -->
      <button
        id="captureBtn"
        class="btn btn-primary"
        style="
          display: none;
          position: fixed;
          bottom: 40px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 999;
          max-width: 500px;
          width: calc(100% - 60px);
          box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
          font-size: 1.1rem;
          padding: 14px;
        "
        disabled
      >
        📸 Dokument scannen
      </button>

      <!-- Floating Taschenlampe -->
      <button
        id="torchBtn"
        class="btn btn-outline-secondary"
        style="
          display: none;
          position: fixed;
          bottom: 110px;
          right: 30px;
          z-index: 999;
          border-radius: 50%;
          width: 50px;
          height: 50px;
          padding: 0;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
          font-size: 1.1rem;
          backdrop-filter: blur(4px);
          align-items: center;
          justify-content: center;
          flex-direction: column;
          text-align: center;
          line-height: 1.2;
        "
        title="Taschenlampe (Aus/An/Auto)"
      >
        ⚡<br /><small style="font-size: 8px">Auto</small>
      </button>
    </div>

    <!-- Zuerst die Scanner-Logik definieren, damit onOpenCvReady bekannt ist -->
    <script src="/scanner.js?v=1777396912"></script>

    <!-- OpenCV.js erst im Hintergrund (defer) laden! -->
    <script
      defer
      src="https://docs.opencv.org/4.8.0/opencv.js"
      onload="onOpenCvReady()"
      type="text/javascript"
    ></script>
  </body>
</html>
