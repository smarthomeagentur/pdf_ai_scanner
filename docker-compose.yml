version: "3.8"

services:
  smart-cloud-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-cloud-scanner
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=${PORT:-3000}
      - LOCAL_AI_HOST=${LOCAL_AI_HOST}
      - APP_PASSWORD=${APP_PASSWORD:-admin}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_123}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
    volumes:
      - scanner-store:/app/store # Hier werden dynamische Dateistorage-Daten, Logins, Jobs und Settings persistent abgelegt
      - scanner-downloads:/app/downloads # Verzeichnisse für temporäre Uploads/Downloads
      - ./gdrive_secret.json:/app/gdrive_secret.json # Geheimnis für den Google Drive Zugriff
volumes:
  scanner-downloads:
  scanner-store:
